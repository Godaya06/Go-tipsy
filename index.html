<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Godaya Liquor Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🍾 Godaya Liquor Store</h1>
  <p>Must be 18+ to purchase</p>
</header>

<section class="products">

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Tusker Beer">
    <h3>Tusker Lager</h3>
    <p>KES 250</p>
    <button onclick="addToCart('Tusker Lager', 250)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="White Cap">
    <h3>White Cap Lager</h3>
    <p>KES 230</p>
    <button onclick="addToCart('White Cap', 230)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Johnnie Walker">
    <h3>Johnnie Walker Red</h3>
    <p>KES 2,500</p>
    <button onclick="addToCart('Johnnie Walker Red', 2500)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Smirnoff Vodka">
    <h3>Smirnoff Vodka</h3>
    <p>KES 1,800</p>
    <button onclick="addToCart('Smirnoff Vodka', 1800)">Add to Cart</button>
  </div>

</section>

<section class="cart">
  <h2>🛒 Cart</h2>
  <ul id="cart-items"></ul>
  <p>Total: KES <span id="total">0</span></p>

  <h3>Payment Options</h3>
  <select id="payment">
    <option>M-Pesa</option>
    <option>Card</option>
    <option>Cash on Delivery</option>
  </select>

  <button onclick="checkout()">Checkout</button>
</section>

<script src="script.js"></script>
</body>
      </html>
